name: Build and Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - uses: actions/checkout@v4

      # 编译C程序
      - name: Compile C program
        run: |
          gcc -o hello hello.c

      # 创建deb包目录结构
      - name: Prepare deb package
        run: |
          mkdir -p hello-deb/DEBIAN
          mkdir -p hello-deb/usr/local/bin
          cp hello hello-deb/usr/local/bin/
          echo "Package: hello" > hello-deb/DEBIAN/control
          echo "Version: 1.0" >> hello-deb/DEBIAN/control
          echo "Section: utils" >> hello-deb/DEBIAN/control
          echo "Priority: optional" >> hello-deb/DEBIAN/control
          echo "Architecture: amd64" >> hello-deb/DEBIAN/control
          echo "Maintainer: Your Name <email@example.com>" >> hello-deb/DEBIAN/control
          echo "Description: A simple Hello World program" >> hello-deb/DEBIAN/control

      # 打包成deb
      - name: Build deb package
        run: |
          dpkg-deb --build hello-deb hello_amd64.deb
          
      # Set tag name
      - name: Set tag name
        run: echo "TAG_NAME=v$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      # 创建 Release 并上传 deb 包
      - name: Create Release 
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Build "
          files: hello_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}